name: reading-time-local

services:
    reading-time:
        container_name: reading-time-local
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        volumes:
            - ./data:/app/data:ro
            - reading-time-local:/tmp/reading-time
        environment:
            PORT: 3000
            DATA_DIR: /app/data
            RENDER_DPI: 120
            JPEG_QUALITY: 85

volumes:
    reading-time-local:
